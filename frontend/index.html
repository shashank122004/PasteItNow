<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PasteItNow</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --text: #222;
      --card: #ffffff;
      --primary: #1f4e79;
      --primary-hover: #163a5a;
      --border: #d6dbe1;
      --muted-bg: #f9fafb;
      --success-bg: #e9f9ee;
      --success-text: #1c6b34;
      --success-border: #b9e7c7;
      --error-bg: #fdecec;
      --error-text: #a12626;
      --error-border: #f5bcbc;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    }

    body.dark {
      --bg: #0f1115;
      --text: #f1f3f5;
      --card: #171a21;
      --primary: #4da3ff;
      --primary-hover: #2d82dd;
      --border: #2d3440;
      --muted-bg: #11151c;
      --success-bg: #12261a;
      --success-text: #7ee2a8;
      --success-border: #295239;
      --error-bg: #2a1616;
      --error-text: #ff8d8d;
      --error-border: #5e2b2b;
      --shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .page-header h1 {
      font-size: 28px;
      color: var(--primary);
    }

    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: var(--shadow);
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle:hover {
      background: var(--muted-bg);
    }

    .top-bar {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      transition: background 0.25s ease;
    }

    .top-bar h2 {
      margin-bottom: 15px;
      color: var(--primary);
    }

    .retrieve-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .retrieve-box input {
      flex: 1;
      min-width: 250px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: var(--muted-bg);
      color: var(--text);
    }

    .retrieve-box button {
      padding: 12px 18px;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .retrieve-box button:hover {
      background: var(--primary-hover);
    }

    .output-box {
      margin-top: 15px;
      padding: 15px;
      background: var(--muted-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-height: 120px;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.5;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 22px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      min-height: 420px;
      transition: background 0.25s ease;
    }

    .card h2 {
      margin-bottom: 18px;
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="file"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: var(--muted-bg);
      color: var(--text);
    }

    textarea {
      min-height: 220px;
      resize: vertical;
    }

    .upload-btn,
    .download-btn {
      width: 100%;
      padding: 14px;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
    }

    .upload-btn {
      background: #28a745;
    }

    .upload-btn:hover {
      background: #1f7f36;
    }

    .download-btn {
      background: var(--primary);
    }

    .download-btn:hover {
      background: var(--primary-hover);
    }

    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    .success {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid var(--success-border);
    }

    .error {
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid var(--error-border);
    }

    .info-box {
      margin-top: 15px;
      padding: 14px;
      background: var(--muted-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      line-height: 1.6;
      font-size: 14px;
    }

    .file-meta {
      margin-top: 12px;
      padding: 12px;
      background: var(--muted-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      line-height: 1.6;
      font-size: 14px;
    }

    .download-link-wrap {
      margin-top: 14px;
    }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>PasteItNow</h1>
      <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="top-bar">
      <h2>Retrieve Paste Content</h2>
      <div class="retrieve-box">
        <input type="text" id="retrievePasteId" placeholder="Enter paste ID to retrieve content" />
        <button onclick="getText()">Get Content</button>
      </div>
      <div class="output-box" id="retrievedContent">Retrieved content will appear here...</div>

      <hr style="margin: 24px 0; border-color: var(--border);" />

      <h2>Retrieve File</h2>
      <div class="retrieve-box">
        <input type="text" id="retrieveFileKey" placeholder="Enter file key to retrieve file" />
        <button onclick="getFile()">Get File</button>
      </div>
      <div class="output-box" id="retrievedFileMessage">File retrieval status will appear here...</div>
    </div>

    <div class="main-grid">
      <div class="card">
        <h2>Upload Text</h2>

        <div class="form-group">
          <label for="pasteId">Paste ID</label>
          <input type="text" id="pasteId" placeholder="Enter custom paste ID" />
        </div>

        <div class="form-group">
          <label for="content">Text Content</label>
          <textarea id="content" placeholder="Write or paste your text here..."></textarea>
        </div>

        <button class="upload-btn" onclick="uploadText()">Upload Text</button>

        <div id="uploadMessage"></div>
      </div>

      <div class="card">
        <h2>File Transfer</h2>

        <div class="form-group">
          <label for="fileKey">File Key</label>
          <input type="text" id="fileKey" placeholder="Enter file key (required)" />
        </div>

        <div class="form-group">
          <label for="fileInput">Choose File</label>
          <input type="file" id="fileInput" />
        </div>

        <button class="upload-btn" onclick="handleFileUpload()">Upload File</button>

        <div id="fileMessage"></div>
        <div id="fileMeta" class="file-meta" style="display:none;"></div>
        <div id="downloadSection" class="download-link-wrap"></div>
      </div>
    </div>
  </div>

  <script>
    const TEXT_API = "https://rkeza33ile.execute-api.ap-south-1.amazonaws.com/default/text";
    const FILE_API = "https://rkeza33ile.execute-api.ap-south-1.amazonaws.com/default/file";

    function toggleTheme() {
      document.body.classList.toggle("dark");
      const isDark = document.body.classList.contains("dark");
      document.getElementById("themeBtn").textContent = isDark ? "☀️" : "🌙";
      localStorage.setItem("pasteitnow-theme", isDark ? "dark" : "light");
    }

    function loadTheme() {
      const savedTheme = localStorage.getItem("pasteitnow-theme");
      const btn = document.getElementById("themeBtn");

      if (savedTheme === "dark") {
        document.body.classList.add("dark");
        btn.textContent = "☀️";
      } else {
        btn.textContent = "🌙";
      }
    }

    async function uploadText() {
      const pasteId = document.getElementById("pasteId").value.trim();
      const content = document.getElementById("content").value.trim();
      const messageBox = document.getElementById("uploadMessage");

      messageBox.innerHTML = "";

      if (!pasteId || !content) {
        messageBox.innerHTML = `
          <div class="message error">Paste ID and content are required.</div>
        `;
        return;
      }

      try {
        const response = await fetch(`${TEXT_API}/upload-text`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ pasteId, content })
        });

        const data = await response.json();

        if (data.status === "success") {
          messageBox.innerHTML = `
            <div class="message success">${data.message}</div>
          `;
          document.getElementById("pasteId").value = "";
          document.getElementById("content").value = "";
        } else {
          messageBox.innerHTML = `
            <div class="message error">${data.message || "Upload failed"}</div>
          `;
        }
      } catch (error) {
        messageBox.innerHTML = `
          <div class="message error">Error connecting to backend.</div>
        `;
        console.error("Upload error:", error);
      }
    }

    async function getText() {
      const pasteId = document.getElementById("retrievePasteId").value.trim();
      const outputBox = document.getElementById("retrievedContent");

      if (!pasteId) {
        outputBox.textContent = "Please enter a paste ID.";
        return;
      }

      outputBox.textContent = "Loading...";

      try {
        const response = await fetch(`${TEXT_API}/get-text/${pasteId}`);
        const data = await response.json();

        if (data.status === "success" && data.content) {
          outputBox.textContent = data.content;
        } else {
          outputBox.textContent = data.message || "Paste not found.";
        }
      } catch (error) {
        outputBox.textContent = "Error retrieving content.";
        console.error("Retrieve error:", error);
      }
    }

    async function getFile() {
      const fileKey = document.getElementById("retrieveFileKey").value.trim();
      const outputBox = document.getElementById("retrievedFileMessage");

      if (!fileKey) {
        outputBox.textContent = "Please enter a file key.";
        return;
      }

      outputBox.textContent = "Loading...";

      try {
        const response = await fetch(`${FILE_API}/get-file/${encodeURIComponent(fileKey)}`);
        const data = await response.json();

        if (data.status === "success" && data.url) {
          outputBox.innerHTML = `
            <div class="message success">Download link ready.</div>
            <div class="info-box"><a href="${data.url}" target="_blank" rel="noopener noreferrer">Download file</a></div>
          `;
        } else {
          outputBox.innerHTML = `<div class="message error">${data.message || "File not found."}</div>`;
        }
      } catch (error) {
        outputBox.innerHTML = `<div class="message error">Error retrieving file.</div>`;
        console.error("File retrieve error:", error);
      }
    }

    async function handleFileUpload() {
      const fileKeyInput = document.getElementById("fileKey");
      const userFileKey = fileKeyInput.value.trim();
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];
      const messageBox = document.getElementById("fileMessage");
      const fileMetaBox = document.getElementById("fileMeta");
      const downloadSection = document.getElementById("downloadSection");

      messageBox.innerHTML = "";
      fileMetaBox.style.display = "none";
      fileMetaBox.innerHTML = "";
      downloadSection.innerHTML = "";

      if (!userFileKey) {
        messageBox.innerHTML = `
          <div class="message error">File Key is required.</div>
        `;
        return;
      }

      if (!file) {
        messageBox.innerHTML = `
          <div class="message error">Please select a file first.</div>
        `;
        return;
      }

      try {
        messageBox.innerHTML = `
          <div class="message">Preparing upload...</div>
        `;

        const fileKey = userFileKey;
        const contentType = file.type || "application/octet-stream";
        const originalFileName = file.name;

        fileMetaBox.style.display = "block";
        fileMetaBox.innerHTML = `
          <strong>Original Name:</strong> ${originalFileName}<br>
          <strong>Content Type:</strong> ${contentType}<br>
          <strong>File Key:</strong> ${fileKey}
        `;

        const response = await fetch(`${FILE_API}/upload-file`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            fileKey,
            contentType: contentType,
            originalFileName: originalFileName
          })
        });

        const data = await response.json();

        if (data.status !== "success") {
          throw new Error(data.message || "Failed to get presigned URL");
        }

        messageBox.innerHTML = `
          <div class="message">Uploading file to storage...</div>
        `;

        const uploadResponse = await fetch(data.presignedUrl, {
          method: "PUT",
          headers: {
            "Content-Type": contentType
          },
          body: file
        });

        if (!uploadResponse.ok) {
          throw new Error("Failed to upload file to S3");
        }

        messageBox.innerHTML = `
          <div class="message success">File uploaded successfully.</div>
        `;

        const downloadApiUrl = `${FILE_API}/download-file?fileKey=${encodeURIComponent(data.fileKey)}`;

        downloadSection.innerHTML = `
          <button class="download-btn" onclick="downloadFile('${encodeURIComponent(data.fileKey)}')">
            Download File
          </button>
          <div class="info-box">
            <strong>Download API:</strong><br>
            ${downloadApiUrl}
          </div>
        `;
      } catch (error) {
        console.error("File upload error:", error);
        messageBox.innerHTML = `
          <div class="message error">${error.message || "File upload failed."}</div>
        `;
      }
    }

    async function downloadFile(encodedFileKey) {
      try {
        const response = await fetch(`${FILE_API}/download-file?fileKey=${encodedFileKey}`);
        const data = await response.json();

        if (data.status !== "success" || !data.presignedUrl) {
          throw new Error(data.message || "Failed to get download URL");
        }

        window.open(data.presignedUrl, "_blank");
      } catch (error) {
        console.error("Download error:", error);
        alert(error.message || "Failed to download file");
      }
    }

    loadTheme();
  </script>
</body>
</html>
