<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PasteItNow</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --text: #222;
      --card: #ffffff;
      --primary: #1f4e79;
      --primary-hover: #163a5a;
      --border: #d6dbe1;
      --muted-bg: #f9fafb;
      --success-bg: #e9f9ee;
      --success-text: #1c6b34;
      --success-border: #b9e7c7;
      --error-bg: #fdecec;
      --error-text: #a12626;
      --error-border: #f5bcbc;
      --placeholder-bg: #f9fbfd;
      --placeholder-text: #4b647a;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }

    body.dark {
      --bg: #0f1115;
      --text: #f1f3f5;
      --card: #171a21;
      --primary: #4da3ff;
      --primary-hover: #2d82dd;
      --border: #2d3440;
      --muted-bg: #11151c;
      --success-bg: #12261a;
      --success-text: #7ee2a8;
      --success-border: #295239;
      --error-bg: #2a1616;
      --error-text: #ff8d8d;
      --error-border: #5e2b2b;
      --placeholder-bg: #11151c;
      --placeholder-text: #9fb2c5;
      --shadow: 0 4px 16px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .page-header h1 {
      font-size: 28px;
      color: var(--primary);
    }

    .theme-toggle {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .theme-toggle:hover {
      background: var(--muted-bg);
    }

    .top-bar {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      transition: background 0.25s ease;
    }

    .top-bar h2 {
      margin-bottom: 15px;
      color: var(--primary);
    }

    .retrieve-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .retrieve-box input {
      flex: 1;
      min-width: 250px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: var(--muted-bg);
      color: var(--text);
    }

    .retrieve-box button {
      padding: 12px 18px;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .retrieve-box button:hover {
      background: var(--primary-hover);
    }

    .output-box {
      margin-top: 15px;
      padding: 15px;
      background: var(--muted-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-height: 80px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 22px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      min-height: 420px;
      transition: background 0.25s ease;
    }

    .card h2 {
      margin-bottom: 18px;
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: var(--muted-bg);
      color: var(--text);
    }

    textarea {
      min-height: 220px;
      resize: vertical;
    }

    button.upload-btn {
      width: 100%;
      padding: 14px;
      border: none;
      background: #28a745;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    button.upload-btn:hover {
      background: #1f7f36;
    }

    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    .success {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid var(--success-border);
    }

    .error {
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid var(--error-border);
    }

    .project-placeholder {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed var(--border);
      border-radius: 10px;
      background: var(--placeholder-bg);
      color: var(--placeholder-text);
      text-align: center;
      padding: 20px;
      font-size: 18px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>PasteItNow</h1>
      <button class="theme-toggle" onclick="toggleTheme()">🌙 Toggle Dark Mode</button>
    </div>

    <div class="top-bar">
      <h2>Retrieve Paste Content</h2>
      <div class="retrieve-box">
        <input type="text" id="retrievePasteId" placeholder="Enter paste ID to retrieve content" />
        <button onclick="getText()">Get Content</button>
      </div>
      <div class="output-box" id="retrievedContent">Retrieved content will appear here...</div>
    </div>

    <div class="main-grid">
      <div class="card">
        <h2>Upload Text</h2>

        <div class="form-group">
          <label for="pasteId">Paste ID</label>
          <input type="text" id="pasteId" placeholder="Enter custom paste ID" />
        </div>

        <div class="form-group">
          <label for="content">Text Content</label>
          <textarea id="content" placeholder="Write or paste your text here..."></textarea>
        </div>

        <button class="upload-btn" onclick="uploadText()">Upload Text</button>

        <div id="uploadMessage"></div>
      </div>

      <div class="card">
        <h2>Projects / Future Features</h2>
        <div class="project-placeholder">
          This section is reserved for future project features.<br><br>
          You can later add:
          <br>• File Upload
          <br>• Recent Pastes
          <br>• Expiry Options
          <br>• Sharing Links
          <br>• Syntax Highlighting
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "http://localhost:8000/text";

    function toggleTheme() {
      document.body.classList.toggle("dark");
      const isDark = document.body.classList.contains("dark");
      localStorage.setItem("pasteitnow-theme", isDark ? "dark" : "light");
    }

    function loadTheme() {
      const savedTheme = localStorage.getItem("pasteitnow-theme");
      if (savedTheme === "dark") {
        document.body.classList.add("dark");
      }
    }

    async function uploadText() {
      const pasteId = document.getElementById("pasteId").value.trim();
      const content = document.getElementById("content").value.trim();
      const messageBox = document.getElementById("uploadMessage");

      messageBox.innerHTML = "";

      if (!pasteId || !content) {
        messageBox.innerHTML = `
          <div class="message error">Paste ID and content are required.</div>
        `;
        return;
      }

      try {
        const response = await fetch(`${BASE_URL}/upload-text`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ pasteId, content })
        });

        const data = await response.json();

        if (data.status === "success") {
          messageBox.innerHTML = `
            <div class="message success">${data.message}</div>
          `;
          document.getElementById("pasteId").value = "";
          document.getElementById("content").value = "";
        } else {
          messageBox.innerHTML = `
            <div class="message error">${data.message || "Upload failed"}</div>
          `;
        }
      } catch (error) {
        messageBox.innerHTML = `
          <div class="message error">Error connecting to backend.</div>
        `;
        console.error("Upload error:", error);
      }
    }

    async function getText() {
      const pasteId = document.getElementById("retrievePasteId").value.trim();
      const outputBox = document.getElementById("retrievedContent");

      if (!pasteId) {
        outputBox.textContent = "Please enter a paste ID.";
        return;
      }

      outputBox.textContent = "Loading...";

      try {
        const response = await fetch(`${BASE_URL}/get-text/${pasteId}`);
        const data = await response.json();
        console.log(data);
        
        if (data.status === "success" && data.content) {
          outputBox.textContent = data.content;
        } else {
          outputBox.textContent = data.message || "Paste not found.";
        }
      } catch (error) {
        outputBox.textContent = "Error retrieving content.";
        console.error("Retrieve error:", error);
      }
    }

    loadTheme();
  </script>
</body>
</html>
